[pytest]
markers =
    uplift: test is run on uplift (daily)
    push: test is run on push (each time)
    n150: test is run on n150 card (blackhole)
    n300: test is run on n300 card (wormhole)
    torch: test uses torch framework
    jax: test uses jax framework
    single_chip: test is run on single_chip
    data_parallel: test is run on data_parallel
    tensor_parallel: test is run on tensor_parallel
